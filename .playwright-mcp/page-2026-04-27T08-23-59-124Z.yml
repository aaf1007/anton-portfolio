            - heading "Resume-aware cover letters" [level=3] [ref=e111]
            - paragraph [ref=e112]: Generate a starter cover letter per job that references both the posting and the user's strongest matching project — turning the ranking into an action, not just a feed.
          - generic [ref=e113]:
            - heading "Application tracker" [level=3] [ref=e114]
            - paragraph [ref=e115]: Let users mark "applied / interviewing / rejected" on each ranked job, then learn from the outcomes — boosting the kinds of postings that historically convert for them.
