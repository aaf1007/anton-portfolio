          - generic [ref=e47]: THE USER JOURNEY
          - heading "Why does enrollment feel like a research project?" [level=2] [ref=e48]
        - generic [ref=e49]:
          - generic [ref=e50]:
            - generic [ref=e51]: ✦
            - generic [ref=e52]:
              - heading "Three tabs, one decision" [level=4] [ref=e53]
              - paragraph [ref=e54]: Picking a section meant juggling SFU MySchedule, Rate My Professor, and a spreadsheet — typing each professor's name into a search bar, copying the number back. Multiply by five courses and the friction starts to make people pick by time slot instead of teaching quality.
          - generic [ref=e55]:
            - generic [ref=e56]: ✦
            - generic [ref=e57]:
              - heading "The data exists; it's just in the wrong place" [level=4] [ref=e58]
              - paragraph [ref=e59]: RMP already has the answer. SFU MySchedule already shows the question. The whole problem is they don't talk to each other — and a content script is the cheapest possible bridge.
      - generic [ref=e60]:
        - generic [ref=e62]: FIRST ATTEMPT
        - generic [ref=e63]:
          - generic [ref=e64]:
            - heading "Naive name lookup" [level=3] [ref=e65]
            - paragraph [ref=e67]: The first prototype scraped the professor name and hit RMP's search endpoint directly from the content script. It worked for "Toby Donaldson" and broke for "T. Donaldson," "Donaldson, Toby," and anyone with a middle initial.
          - generic [ref=e68]:
            - heading "What I missed" [level=3] [ref=e69]
            - paragraph [ref=e71]: Real-world name normalization is messier than expected. Rate My Professor is a public-facing search, not an API — fuzziness was the actual product, not a bug to fix in one shot.
      - generic [ref=e72]:
        - generic [ref=e73]:
          - generic [ref=e74]: WHAT MADE IT WORK
          - heading "Bridge the two pages, don't replace them" [level=2] [ref=e75]
        - generic [ref=e76]:
          - img "Course schedule rows with injected RMP ratings" [ref=e78]
          - generic [ref=e79]:
            - 'heading "MV3 content script with name normalization — Feature #1" [level=3] [ref=e80]'
            - paragraph [ref=e81]: The content script reads each row in MySchedule, strips honorifics and trailing initials, and queries RMP's search through the background service worker. Multiple name variants are tried in priority order, with the first confident match cached locally.
        - paragraph [ref=e82]: Speed matters more than ranking — students scan, not read.
        - generic [ref=e83]:
          - img "Inline rating badges on each course row" [ref=e85]
          - generic [ref=e86]:
            - 'heading "Inline badges, not popups — Feature #2" [level=3] [ref=e87]'
            - paragraph [ref=e88]: Ratings render as small Tailwind-styled badges next to the professor name — average score, difficulty, and would-take-again — colored by threshold so good and bad sections are visually obvious at a glance. No hover, no click, no flow break.
        - paragraph [ref=e89]: And to keep it polite to RMP's servers —
        - generic [ref=e90]:
          - img "Background service worker handling cached lookups" [ref=e92]
          - generic [ref=e93]:
            - 'heading "Background worker + per-name cache — Feature #3" [level=3] [ref=e94]'
            - paragraph [ref=e95]: The service worker dedupes lookups across tabs, caches results per normalized name, and respects sensible request rates. Reloading a schedule doesn't re-query RMP — and a quiet extension is a long-lived extension.
      - generic [ref=e96]:
        - generic [ref=e98]: REFLECTIONS
        - generic [ref=e99]:
          - generic [ref=e100]:
            - heading "Small extensions are good design exercises" [level=3] [ref=e101]
            - paragraph [ref=e102]: There's no room to hide behind features. The whole product is one interaction — name in, rating out — and every decision (badge placement, color thresholds, cache TTL) is visible to the user. That constraint forces clearer thinking than a bigger app would.
          - generic [ref=e103]:
            - heading "Scraping is a UX problem" [level=3] [ref=e104]
            - paragraph [ref=e105]: The technical work was easy; the UX work was making sure the extension never broke MySchedule's existing flow. A content script that throws errors into the page is worse than no extension at all.
      - generic [ref=e106]:
