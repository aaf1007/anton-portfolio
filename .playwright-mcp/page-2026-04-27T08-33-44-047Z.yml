        - list [ref=e125]:
          - listitem [ref=e126]: Reached ~96% accuracy with recall on malignant class prioritized via F2-score threshold tuning.
          - listitem [ref=e127]: Compared three model families (logistic regression, KNN, decision tree) under a single evaluation framework.
          - listitem [ref=e128]: Implemented logistic regression from scratch with gradient descent and L2 regularization.
          - listitem [ref=e129]: Made the case that domain context — not just model choice — should drive evaluation.
