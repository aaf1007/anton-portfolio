          - generic [ref=e47]: THE PROBLEM
          - heading "Why accuracy is the wrong metric here" [level=2] [ref=e48]
        - generic [ref=e49]:
          - generic [ref=e50]:
            - generic [ref=e51]: ✦
            - generic [ref=e52]:
              - heading "False negatives kill" [level=4] [ref=e53]
              - paragraph [ref=e54]: A model that misses a malignant tumor sends a sick person home with a clean bill of health. A model that flags a benign tumor sends a healthy person to a follow-up biopsy. These are not symmetric errors — and any metric that treats them as such is the wrong metric.
          - generic [ref=e55]:
            - generic [ref=e56]: ✦
            - generic [ref=e57]:
              - heading "Imbalance hides the failure mode" [level=4] [ref=e58]
              - paragraph [ref=e59]: The dataset is roughly 63% benign / 37% malignant. A model that predicts 'benign' for everything still scores 63% accuracy — and looks fine on a confusion matrix glanced at quickly. We needed evaluation that would surface that failure, not paper over it.
      - generic [ref=e60]:
        - generic [ref=e62]: FIRST PASS
        - generic [ref=e63]:
          - generic [ref=e64]:
            - heading "Default scikit-learn" [level=3] [ref=e65]
            - paragraph [ref=e67]: We started with out-of-the-box logistic regression, KNN, and a decision tree on raw features. Accuracy hit 94% on the first try, which was suspicious — and recall on the malignant class was lower than the headline number suggested.
          - generic [ref=e68]:
            - heading "What was missing" [level=3] [ref=e69]
            - paragraph [ref=e71]: No feature scaling (KNN was secretly broken), no cross-validation (single-split scores were noisy), and no recall-aware thresholding (every model was using 0.5 by default). The "easy 94%" was leaving real malignant cases on the table.
      - generic [ref=e72]:
        - generic [ref=e73]:
          - generic [ref=e74]: THE SYSTEM WE BUILT
          - heading "Three models, one recall-first pipeline" [level=2] [ref=e75]
        - generic [ref=e76]:
          - img "Logistic regression decision boundary visualization" [ref=e78]
          - generic [ref=e79]:
            - 'heading "Logistic regression from scratch — Feature #1" [level=3] [ref=e80]'
            - paragraph [ref=e81]: "Rather than using sklearn's implementation, we wrote logistic regression from scratch — gradient descent, L2 regularization, and a configurable learning rate. Building it ourselves made the bias/variance trade-offs visible: we could see exactly how regularization strength shifted the decision boundary."
        - paragraph [ref=e82]: One model was a baseline. Three made the trade-offs visible.
        - generic [ref=e83]:
          - img "Cross-validation results across model families" [ref=e85]
          - generic [ref=e86]:
            - 'heading "KNN + Decision Tree, tuned — Feature #2" [level=3] [ref=e87]'
            - paragraph [ref=e88]: We added a tuned KNN classifier and a decision tree, both selected via 5-fold stratified K-fold grid search over hyperparameters. Stratification kept the class balance consistent across folds — important when the minority class is the one that matters most.
        - paragraph [ref=e89]: Then the actual win — making the system care about the right error.
        - generic [ref=e90]:
          - img "F2 score across decision thresholds" [ref=e92]
          - generic [ref=e93]:
            - 'heading "F2-score threshold tuning — Feature #3" [level=3] [ref=e94]'
            - paragraph [ref=e95]: Instead of using each model's default 0.5 cutoff, we swept the decision threshold and selected the value that maximized the F2 score — which weights recall twice as heavily as precision. This pushed recall on malignant cases up without collapsing precision into uselessness.
      - generic [ref=e96]:
        - generic [ref=e98]: REFLECTIONS
        - generic [ref=e99]:
          - generic [ref=e100]:
            - heading "The metric is the model" [level=3] [ref=e101]
            - paragraph [ref=e102]: Choosing F2 over accuracy or F1 wasn't a tweak — it was the actual design decision. Once we picked the right loss to optimize against, most of the modeling choices fell out of it. Picking the metric first, then the model, is the lesson I'm taking forward.
          - generic [ref=e103]:
            - heading "Building from scratch teaches what libraries hide" [level=3] [ref=e104]
            - paragraph [ref=e105]: Reimplementing logistic regression took an extra weekend and was never going to beat sklearn's version. But debugging our own gradient descent — watching it diverge with the wrong learning rate, stabilize with L2 — taught more than any tutorial would.
      - generic [ref=e106]:
        - generic [ref=e108]: WHAT'S NEXT
        - generic [ref=e109]:
          - generic [ref=e110]:
            - heading "Calibrated probabilities" [level=3] [ref=e111]
            - paragraph [ref=e112]: Right now the threshold is tuned, but the underlying probabilities aren't calibrated. Platt scaling or isotonic regression would let the model say "70% likely malignant" and have that mean something — useful if it ever fed into a downstream decision system.
          - generic [ref=e113]:
            - heading "Ensemble vote" [level=3] [ref=e114]
            - paragraph [ref=e115]: All three classifiers agree on the easy cases and disagree on the hard ones. A simple majority-vote ensemble — or stacking with a meta-learner — would likely squeeze out the last few missed malignant cases.
          - generic [ref=e116]:
            - heading "Feature interpretability" [level=3] [ref=e117]
            - paragraph [ref=e118]: Add SHAP values to surface which of the 30 features drove each prediction. In a clinical context, "this is malignant" is much less useful than "this is malignant because of feature X."
          - generic [ref=e119]:
            - heading "External validation" [level=3] [ref=e120]
            - paragraph [ref=e121]: UCI's dataset is small and clean. Re-running the pipeline against a larger, noisier dataset (e.g. TCGA) would test whether the threshold-tuning gains hold up under distribution shift.
      - generic [ref=e122]:
