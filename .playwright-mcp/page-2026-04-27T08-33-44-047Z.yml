        - generic [ref=e26]:
          - paragraph [ref=e27]: A comparative diagnostic system that classifies breast tumors as benign or malignant — built to minimize missed malignant diagnoses, not just maximize accuracy.
          - paragraph [ref=e28]: For our CMPT 310 final project, we built and compared three machine learning classifiers on the UCI Breast Cancer Wisconsin dataset (569 samples, 30 features). The goal wasn't a leaderboard score — it was building the right system for a domain where false negatives are catastrophic and false positives are recoverable.
          - paragraph [ref=e29]: "That framing — recall over accuracy — drove every decision: model choice, threshold tuning, and how we evaluated the final pipeline."
