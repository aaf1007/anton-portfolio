          - generic [ref=e49]: THE PREMISE
          - heading "What if the editor took your attention seriously?" [level=2] [ref=e50]
        - generic [ref=e51]:
          - generic [ref=e52]:
            - generic [ref=e53]: ✦
            - generic [ref=e54]:
              - heading "The rot is already happening" [level=4] [ref=e55]
              - paragraph [ref=e56]: Most of us already context-switch between code and TikTok every 90 seconds. Pretending we don't is the lie. We wanted an editor that admitted it — and turned the dopamine pipeline into a feature instead of a leak.
          - generic [ref=e57]:
            - generic [ref=e58]: ✦
            - generic [ref=e59]:
              - heading "A silly hack with real surface area" [level=4] [ref=e60]
              - paragraph [ref=e61]: SillyHacks rewards commitment to the bit. But to actually win, the bit has to work. We had to build a real editor (Monaco), real AI (Gemini), and real distractions — and make all three feel like one product, not three iframes in a trench coat.
      - generic [ref=e62]:
        - generic [ref=e64]: FIRST 6 HOURS
        - generic [ref=e65]:
          - generic [ref=e66]:
            - 'heading "V0: Monaco + iframe" [level=3] [ref=e67]'
            - paragraph [ref=e69]: We dropped Monaco into a Next.js page and embedded a YouTube iframe next to it. Functional, but it felt like two tabs glued together — the bit didn't read.
          - generic [ref=e70]:
            - heading "What was missing" [level=3] [ref=e71]
            - paragraph [ref=e73]: "The \"brain rot\" needed to feel native to the editor — not a browser tab. Same with the AI: a chat sidebar wasn't enough. Everything had to share one keyboard, one focus model, one vibe."
      - generic [ref=e74]:
        - generic [ref=e75]:
          - generic [ref=e76]: WHAT WE BUILT
          - heading "Three panels, one editor" [level=2] [ref=e77]
        - generic [ref=e78]:
          - img "Monaco editor in BSCode" [ref=e80]
          - generic [ref=e81]:
            - 'heading "Monaco at the core — Feature #1" [level=3] [ref=e82]'
            - paragraph [ref=e83]: The same engine that powers VS Code, dropped into the browser with syntax highlighting, multi-cursor, and a file tree. We kept the keyboard shortcuts familiar so anyone who's used VS Code feels at home — which makes the rest of the gag funnier.
        - paragraph [ref=e84]: A code editor without an AI in 2026 is basically Notepad.
        - generic [ref=e85]:
          - img "Gemini chat panel" [ref=e87]
          - generic [ref=e88]:
            - 'heading "Gemini chat with file context — Feature #2" [level=3] [ref=e89]'
            - paragraph [ref=e90]: The chat panel automatically pipes the active file into Gemini's context, so you can ask 'why is this broken' or 'rewrite this in TypeScript' without copy-pasting. It's the only part of BSCode that's unironically useful.
        - paragraph [ref=e91]: And the part that made the demo pop —
        - generic [ref=e92]:
          - img "Brain rot video and Subway Surfers panels" [ref=e94]
          - generic [ref=e95]:
            - 'heading "Brain Rot tab + Subway Surfers — Feature #3" [level=3] [ref=e96]'
            - paragraph [ref=e97]: A dedicated panel for autoplaying short-form video and a Subway Surfers split-screen running in real time. The judges laughed, then realized we'd actually wired them up as first-class panels with their own keyboard shortcut. That was the win.
      - generic [ref=e98]:
        - generic [ref=e100]: REFLECTIONS
        - generic [ref=e101]:
          - generic [ref=e102]:
            - heading "Commit harder than feels reasonable" [level=3] [ref=e103]
            - paragraph [ref=e104]: The pitch we almost made was 'a fun coding environment.' The pitch that won was 'the editor for people who can't focus.' Halfway-funny doesn't survive a 2-minute demo — full commitment to the bit does.
          - generic [ref=e105]:
            - heading "Polish wins jokes" [level=3] [ref=e106]
            - paragraph [ref=e107]: We spent the last 4 hours on transitions, panel resizing, and a real landing page — not new features. The judges remembered the polish more than the feature list.
      - generic [ref=e108]:
