        - generic [ref=e111]:
          - generic [ref=e112]:
            - heading "Real file persistence" [level=3] [ref=e113]
            - paragraph [ref=e114]: Files currently live in localStorage. Adding GitHub gist sync would make BSCode usable for actual scratchpad work, not just demos.
          - generic [ref=e115]:
            - heading "Custom rot feeds" [level=3] [ref=e116]
            - paragraph [ref=e117]: Let users plug in their own short-form sources — TikTok, Reels, X — so the rot is personalized. The joke gets sharper the more tailored it is.
          - generic [ref=e118]:
            - heading "Focus mode (ironically)" [level=3] [ref=e119]
            - paragraph [ref=e120]: A toggle that hides the rot panels and turns BSCode into a clean editor. The premise becomes funnier when the user can opt out of it — and stays.
