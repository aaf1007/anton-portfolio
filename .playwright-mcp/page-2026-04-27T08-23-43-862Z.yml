        - generic [ref=e109]:
          - generic [ref=e110]:
            - heading "Real file persistence" [level=3] [ref=e111]
            - paragraph [ref=e112]: Files currently live in localStorage. Adding GitHub gist sync would make BSCode usable for actual scratchpad work, not just demos.
          - generic [ref=e113]:
            - heading "Custom rot feeds" [level=3] [ref=e114]
            - paragraph [ref=e115]: Let users plug in their own short-form sources — TikTok, Reels, X — so the rot is personalized. The joke gets sharper the more tailored it is.
          - generic [ref=e116]:
            - heading "Focus mode (ironically)" [level=3] [ref=e117]
            - paragraph [ref=e118]: A toggle that hides the rot panels and turns BSCode into a clean editor. The premise becomes funnier when the user can opt out of it — and stays.
