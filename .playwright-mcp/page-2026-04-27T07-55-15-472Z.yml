        - generic [ref=e114]: Reflections
        - generic [ref=e115]:
          - generic [ref=e116]:
            - heading "Reframing is a design skill" [level=3] [ref=e117]
            - paragraph [ref=e118]: The most valuable thing I've done on starmap isn't any individual feature — it's getting clearer on what the product is actually for. Relationship tools are easy to overbuild. Every iteration where I removed something taught me more than the ones where I added.
          - generic [ref=e119]:
            - heading "Emailing users for feedback" [level=3] [ref=e120]
            - paragraph [ref=e121]: I reached out directly to early users by email to understand how they were actually using the graph. The responses shaped the roadmap more than any analytics could — people weren't using features I'd spent the most time on, and were asking for things I hadn't considered.
      - generic [ref=e122]:
        - generic [ref=e123]: Next Steps
        - generic [ref=e124]:
          - generic [ref=e125]:
            - heading "Notion integration" [level=3] [ref=e126]
            - paragraph [ref=e127]: Most people who care about relationship context already live in Notion. A two-way sync would let users pull existing notes into starmap profiles and push updates back — so it fits into an existing workflow rather than asking people to build a new one from scratch.
          - generic [ref=e128]:
            - heading "Shift-click to connect nodes" [level=3] [ref=e129]
            - paragraph [ref=e130]: "Right now creating a connection requires opening a modal. The faster interaction would be: hold Shift, click two nodes, and they connect — with a lightweight inline label prompt. This makes the graph feel more direct and spatial, like drawing on a canvas rather than filling out a form."
          - generic [ref=e131]:
            - heading "Location as a dropdown" [level=3] [ref=e132]
            - paragraph [ref=e133]: Location is currently a free-text field, which means the same city gets entered twelve different ways. Switching to a dropdown that saves and suggests previous entries would make filtering by location reliable — and open up a “who's nearby” view that currently isn't possible.
          - generic [ref=e134]:
            - heading "Deeper user research" [level=3] [ref=e135]
            - paragraph [ref=e136]: The next round of emails to users will be more structured — specific questions about which features they actually return to, what's missing before they'd recommend it, and whether the graph view or list view is doing more work for them day-to-day.
