          - generic [ref=e47]: THE USER JOURNEY
          - heading "Why does fact-checking feel like a chore?" [level=2] [ref=e48]
        - generic [ref=e49]:
          - generic [ref=e50]:
            - generic [ref=e51]: ✦
            - generic [ref=e52]:
              - heading "Context-switching tax" [level=4] [ref=e53]
              - paragraph [ref=e54]: Every time I saw a dubious claim — a stat in a tweet, a confident sentence in a blog post — verifying it meant opening three tabs, copying text, and skimming sources. By the time I had an answer, I'd usually lost the thread of what I was reading.
          - generic [ref=e55]:
            - generic [ref=e56]: ✦
            - generic [ref=e57]:
              - heading "Trust without traceability" [level=4] [ref=e58]
              - paragraph [ref=e59]: Generic chatbots could answer 'is this true?' but rarely cited where the answer came from. A verdict without a source is just a vibe — and that's worse than no verdict at all.
      - generic [ref=e60]:
        - generic [ref=e62]: FIRST SOLUTION
        - generic [ref=e63]:
          - generic [ref=e64]:
            - heading "A bookmarklet" [level=3] [ref=e65]
            - paragraph [ref=e67]: I started with a one-line bookmarklet that POSTed selected text to a local FastAPI endpoint. It worked, but it broke on most sites with strict CSPs, and the response had nowhere to live — it just dumped JSON into an alert box.
          - generic [ref=e68]:
            - heading "Problems" [level=3] [ref=e69]
            - paragraph [ref=e71]: No persistent UI, no history, no follow-up questions. The verification happened in a vacuum and disappeared the moment I clicked away.
      - generic [ref=e72]:
        - generic [ref=e73]:
          - generic [ref=e74]: WHY VERIFAI EXISTS
          - heading "What if the verdict lived next to the page?" [level=2] [ref=e75]
        - generic [ref=e76]:
          - img "VerifAI sidepanel rendering a streamed verdict" [ref=e78]
          - generic [ref=e79]:
            - 'heading "Right-click, verify — Feature #1" [level=3] [ref=e80]'
            - paragraph [ref=e81]: A Manifest V3 content script adds a 'Verify with VerifAI' option to the native context menu. Selected text is sent to the backend, claims are extracted by Groq, and the result streams back into a browser sidepanel — no tab switching, no copy-paste.
        - paragraph [ref=e82]: The verdict alone wasn't enough — I needed to see the receipts.
        - generic [ref=e83]:
          - img "Citations and confidence score panel" [ref=e85]
          - generic [ref=e86]:
            - 'heading "Grounded sources, not vibes — Feature #2" [level=3] [ref=e87]'
            - paragraph [ref=e88]: Verification runs through Gemini Search Grounding, which returns the live URLs the model used to reach its conclusion. Each verdict comes with a confidence score and clickable citations — so 'true' or 'false' is auditable instead of opaque.
        - paragraph [ref=e89]: One verdict was useful. A conversation around it was better.
        - generic [ref=e90]:
          - img "History tab and contextual chatbot" [ref=e92]
          - generic [ref=e93]:
            - 'heading "History + contextual chatbot — Feature #3" [level=3] [ref=e94]'
            - paragraph [ref=e95]: Every verification is saved to a history tab, and each result opens into a follow-up chat scoped to the original claim and its sources. You can ask 'where did this number come from?' or 'what's the counter-argument?' without re-pasting context.
