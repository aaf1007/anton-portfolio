            - paragraph [ref=e102]: Showing tokens as they arrive — instead of a 6-second spinner — made the verdict feel investigated rather than declared. The mechanics didn't change; the perception of rigor did.
          - generic [ref=e103]:
            - heading "Browser extensions are a UX constraint, not a checkbox" [level=3] [ref=e104]
            - paragraph [ref=e105]: Manifest V3, sidepanel APIs, and CSP rules forced design decisions I'd otherwise have hand-waved. Working inside those constraints ended up sharpening the product, not limiting it.
